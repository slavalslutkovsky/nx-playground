apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: testkube
  namespace: testkube
spec:
  interval: 30m
  chart:
    spec:
      chart: testkube
      version: "*"
      sourceRef:
        kind: HelmRepository
        name: kubeshop
        namespace: flux-system
  install:
    createNamespace: false
  values:
    testkube-api:
      multinamespace:
        enabled: true
    testkube-dashboard:
      enabled: true
    mongodb:
      enabled: true
      persistence:
        enabled: true
        size: 8Gi
    nats:
      enabled: true
